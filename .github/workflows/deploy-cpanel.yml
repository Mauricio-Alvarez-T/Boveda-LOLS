name: Deploy Bóveda LOLS to cPanel 🚀

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Obtener el código más reciente
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar Dependencias Frontend
        working-directory: ./frontend
        run: npm ci

      - name: 🔨 Compilar Frontend (React)
        working-directory: ./frontend
        run: npm run build

      - name: 🔧 Instalar lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: 🌐 Sincronizar Frontend vía lftp
        env:
          FTP_PASS: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 4;
            open -u lolscl,\"$FTP_PASS\" ftp.lols.cl;
            mirror -R --only-newer --parallel=4 \
              --exclude-glob .git* \
              --exclude node_modules/ \
              ./frontend/dist/ /public_html/boveda.lols.cl/;
          "

      - name: ⚙️ Sincronizar Backend vía lftp
        env:
          FTP_PASS: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 4;
            open -u lolscl,\"$FTP_PASS\" ftp.lols.cl;
            mirror -R --only-newer --parallel=4 \
              --exclude-glob .git* \
              --exclude node_modules/ \
              --exclude tmp/ \
              --exclude uploads/ \
              --exclude-glob .env* \
              ./backend/ /boveda/;
          "

      - name: 🚀 Reiniciar Passenger (restart.txt vía curl)
        run: |
          mkdir -p ./restart-trigger
          date > ./restart-trigger/restart.txt
          curl --fail --silent --show-error \
            --connect-timeout 30 \
            --max-time 120 \
            --ftp-create-dirs \
            -T ./restart-trigger/restart.txt \
            -u "lolscl:${{ secrets.CPANEL_FTP_PASSWORD }}" \
            "ftp://ftp.lols.cl/boveda/tmp/restart.txt"
