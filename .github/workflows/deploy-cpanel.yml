name: Deploy Bóveda LOLS to cPanel 🚀

# MÉTODO PULL-SIDE (2026-06-16): el FTP de cPanel banea de forma persistente la
# IP del runner de GitHub (cPHulk) → "Connection refused" también en prod. En
# vez de empujar por FTP, este workflow SOLO compila el frontend y publica
# `frontend/dist` + `backend/` en la rama `deploy-prod`. El SERVIDOR hace
# `git pull` de esa rama (saliente, no bloqueada) vía cron y se auto-despliega.
# Ver scripts/cpanel-deploy-prod.sh y docs/PLAYBOOK_PULL_SIDE_CPANEL.md (§7).

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write   # para publicar la rama deploy-prod con GITHUB_TOKEN

jobs:
  build-and-publish:
    name: 🎉 Build & publicar rama deploy-prod
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Obtener el código (historial completo para poder pushear rama)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar Dependencias Frontend
        working-directory: ./frontend
        run: npm ci

      - name: 🔨 Compilar Frontend (React)
        working-directory: ./frontend
        run: npm run build

      - name: 🌿 Publicar dist + backend a la rama deploy-prod
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # frontend/dist está en .gitignore → forzar su inclusión en este commit
          git add -f frontend/dist
          git commit -m "build(prod): dist de ${GITHUB_SHA::7} [skip ci]" \
            || echo "ℹ️ sin cambios nuevos para commitear (dist idéntico)"
          # La rama deploy-prod NO dispara workflows (solo develop/main lo hacen).
          git push -f origin HEAD:deploy-prod
          echo "✅ Rama deploy-prod actualizada. El servidor la baja vía cron (git pull saliente)."
