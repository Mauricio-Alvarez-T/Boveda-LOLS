name: Deploy Bóveda LOLS to cPanel 🚀

on:
  push:
    branches:
      - main # O la rama que uses como principal
  workflow_dispatch: # Permite ejecutar el despliegue manualmente desde GitHub

jobs:
  web-deploy:
    name: 🎉 Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Obtener el código más reciente
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar Dependencias Frontend
        working-directory: ./frontend
        run: npm ci

      - name: 🔨 Compilar Frontend (React)
        working-directory: ./frontend
        run: npm run build

      - name: 🌐 Sincronizar Frontend vía FTP a cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.lols.cl
          username: lolscl
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: /public_html/boveda.lols.cl/
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: ⚙️ Sincronizar Backend vía FTP a cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.lols.cl
          username: lolscl
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: /boveda/
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tmp/**
            .env*

      - name: 🚀 Reiniciar Passenger (upload solo restart.txt vía curl)
        run: |
          mkdir -p ./restart-trigger
          date > ./restart-trigger/restart.txt
          curl --fail --silent --show-error \
            --connect-timeout 30 \
            --max-time 120 \
            --ftp-create-dirs \
            -T ./restart-trigger/restart.txt \
            -u "lolscl:${{ secrets.CPANEL_FTP_PASSWORD }}" \
            "ftp://ftp.lols.cl/boveda/tmp/restart.txt"
