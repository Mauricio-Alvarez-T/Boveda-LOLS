name: Deploy Staging to cPanel 🧪

# MÉTODO PULL-SIDE (2026-06-12): el FTP de cPanel rechaza la IP entrante del
# runner de GitHub (cPHulk / firewall de IPs cloud) → "Connection refused".
# En vez de empujar por FTP, este workflow SOLO compila el frontend y publica
# `frontend/dist` + `backend/` en la rama `deploy-staging`. El SERVIDOR hace
# `git pull` de esa rama (conexión saliente, no bloqueada) vía cron y se
# auto-despliega. Ver scripts/cpanel-deploy-staging.sh y docs/RUNBOOK.md.

on:
  push:
    branches:
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write   # para publicar la rama deploy-staging con GITHUB_TOKEN

jobs:
  build-and-publish:
    name: 🎉 Build & publicar rama deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Obtener el código (historial completo para poder pushear rama)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar Dependencias Frontend
        working-directory: ./frontend
        run: npm ci

      - name: 🔨 Compilar Frontend (React)
        working-directory: ./frontend
        run: npm run build

      - name: 🌿 Publicar dist + backend a la rama deploy-staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # frontend/dist está en .gitignore → forzar su inclusión en este commit
          git add -f frontend/dist
          git commit -m "build(staging): dist de ${GITHUB_SHA::7} [skip ci]" \
            || echo "ℹ️ sin cambios nuevos para commitear (dist idéntico)"
          # La rama deploy-staging NO dispara workflows (solo develop/main lo hacen).
          git push -f origin HEAD:deploy-staging
          echo "✅ Rama deploy-staging actualizada. El servidor la baja vía cron (git pull saliente)."
